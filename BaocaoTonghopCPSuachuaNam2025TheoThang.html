    <script>
        const REPORT_TAB_URLS = {
            "sc-bc01": "BaocaoTonghopCPSuachua.html",
            "sc-bc02": "BaocaoThanhToanCPSuachuaTheoThang.html",
            "sc-bc03": "BaocaoChitietCPSuachuaNam2025.html",
            "sc-bc04": "BaocaoTonghopCPSuachuaNam2025TheoThang.html"
        };

        const TOP_GROUP_TAB_MAP = {
            "sua-chua": new Set(["tab-sc-bc01", "tab-sc-bc02", "tab-sc-bc03", "tab-sc-bc04"])
        };

        function getCurrentTopGroup() {
            return (new URLSearchParams(window.location.search).get("group") || "").trim();
        }

        function appendGroupToTarget(url) {
            const group = getCurrentTopGroup();
            if (!group) return url;
            try {
                const u = new URL(url, window.location.href);
                u.searchParams.set("group", group);
                return `${u.pathname}${u.search}${u.hash}`;
            } catch (e) {
                const sep = url.includes("?") ? "&" : "?";
                return `${url}${sep}group=${encodeURIComponent(group)}`;
            }
        }

        function applyGroupedTabVisibility() {
            const allowed = TOP_GROUP_TAB_MAP[getCurrentTopGroup()];
            if (!allowed) return;
            const container = document.querySelector(".report-tabs-container");
            if (!container) return;
            let visible = 0;
            container.querySelectorAll(".report-tab-btn").forEach((btn) => {
                const show = allowed.has(btn.id || "");
                btn.style.display = show ? "" : "none";
                if (show) visible += 1;
            });
            if (!visible) container.style.display = "none";
        }

        function switchReportTab(tabId) {
            const target = REPORT_TAB_URLS[tabId];
            if (!target) return;
            if (tabId === "sc-bc04") return;
            window.location.href = appendGroupToTarget(target);
        }

        applyGroupedTabVisibility();

        function yearFromDateInput(inputId) {
            const v = document.getElementById(inputId)?.value?.trim() ?? "";
            const m = v.match(/^(\d{4})-\d{2}-\d{2}$/);
            return m ? parseInt(m[1], 10) : null;
        }

        function syncMainTitleFromDateRange() {
            const yFrom = yearFromDateInput("thang-filter-from-date");
            const yTo = yearFromDateInput("thang-filter-to-date");
            const h1 = document.getElementById("thang-main-title");
            const base = "BÁO CÁO TỔNG HỢP CP SỬA CHỮA";
            let yearSuffix = "";
            if (yFrom != null && yTo != null) {
                const a = Math.min(yFrom, yTo);
                const b = Math.max(yFrom, yTo);
                yearSuffix = a === b ? ` NĂM ${a}` : ` NĂM ${a}–${b}`;
            } else if (yFrom != null) {
                yearSuffix = ` NĂM ${yFrom}`;
            } else if (yTo != null) {
                yearSuffix = ` NĂM ${yTo}`;
            }
            const mainText = yearSuffix ? `${base}${yearSuffix}` : base;
            if (h1) h1.textContent = mainText;
            if (yearSuffix) {
                const yPart = yearSuffix.replace(/^ NĂM /, "").trim();
                document.title = `Báo cáo tổng hợp CP sửa chữa năm ${yPart} theo tháng`;
            } else {
                document.title = "Báo cáo tổng hợp CP sửa chữa theo tháng";
            }
        }

        function getTimestampForFileName() {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, "0");
            return `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        }

        async function exportPageTableToExcel(tableSelector, filePrefix) {
            const table = document.querySelector(tableSelector) || document.querySelector("table");
            if (!table) {
                alert("Không tìm thấy bảng để xuất Excel.");
                return;
            }
            if (!window.ExcelJS) {
                alert("Không tải được thư viện xuất Excel (ExcelJS).");
                return;
            }

            const button = document.getElementById("export-excel");
            if (button) button.disabled = true;

            try {
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet("BaoCao");
                const rows = Array.from(table.rows).map((row) =>
                    Array.from(row.cells).map((cell) => String(cell.innerText || "").replace(/\s+/g, " ").trim())
                );
                rows.forEach((r) => worksheet.addRow(r));

                const headerRowCount = table.tHead ? table.tHead.rows.length : 1;
                for (let i = 1; i <= headerRowCount; i += 1) {
                    worksheet.getRow(i).font = { bold: true };
                }

                const colCount = rows.reduce((max, row) => Math.max(max, row.length), 0);
                for (let c = 1; c <= colCount; c += 1) {
                    let maxLen = 10;
                    rows.forEach((r) => {
                        const val = r[c - 1] || "";
                        if (val.length > maxLen) maxLen = val.length;
                    });
                    worksheet.getColumn(c).width = Math.min(36, Math.max(9, maxLen + 2));
                }

                const fileName = `${filePrefix}-${getTimestampForFileName()}.xlsx`;
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], {
                    type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);
            } catch (error) {
                alert(`Xuất Excel thất bại: ${error?.message || error}`);
            } finally {
                if (button) button.disabled = false;
            }
        }

        function exportPageToPdf() {
            window.print();
        }

        const exportExcelBtn = document.getElementById("export-excel");
        const exportPdfBtn = document.getElementById("export-pdf");

        if (exportExcelBtn) {
            exportExcelBtn.addEventListener("click", () => exportPageTableToExcel(".summary-month-table", "bao-cao-tong-hop-cp-sua-chua-nam-2025-theo-thang"));
        }
        if (exportPdfBtn) {
            exportPdfBtn.addEventListener("click", exportPageToPdf);
        }

        syncMainTitleFromDateRange();
        for (const id of ["thang-filter-from-date", "thang-filter-to-date"]) {
            const el = document.getElementById(id);
            if (!el) continue;
            const fn = () => syncMainTitleFromDateRange();
            el.addEventListener("input", fn);
            el.addEventListener("change", fn);
        }

        /* ========== AppSheet Data Loading ========== */
        const APPSHEET_CONFIG = {
            appId: "3be5baea-960f-4d3f-b388-d13364cc4f22",
            accessKey: "V2-GaoRd-ItaM1-r44oH-c6Smd-uOe7V-cmVoK-IJINF-5XLQa"
        };
        const TABLE_NXLC_CT = "Nhập xuất luân chuyển CT";
        let cacheNxlcCtRows = null;

        function normalizeSpaces(s) { return String(s ?? "").trim().replace(/\s+/g, " "); }
        function cellString(v) {
            if (v == null) return "";
            if (typeof v === "object" && v !== null && "Value" in v) return String(v.Value);
            if (typeof v === "object" && v !== null && "value" in v) return String(v.value);
            return String(v);
        }
        function cellDisplayString(v) {
            if (v == null) return "";
            if (typeof v === "object" && v !== null) {
                const d = v.DisplayValue ?? v.displayValue ?? v.FormattedValue ?? v.formattedValue ?? v.Text ?? v.text;
                if (d != null && String(d).trim() !== "") return String(d);
            }
            return cellString(v);
        }
        function escapeHtml(value) {
            return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        function pickFirstCell(row, keys) {
            for (const k of keys) {
                const v = row?.[k]; if (v == null) continue;
                const s = normalizeSpaces(cellDisplayString(v)); if (s) return s;
            }
            return "";
        }
        function pickByRegex(row, pattern) {
            for (const [k, v] of Object.entries(row || {})) {
                if (!pattern.test(normalizeSpaces(k))) continue;
                const s = normalizeSpaces(cellDisplayString(v)); if (s) return s;
            }
            return "";
        }
        function parseNumeric(raw) {
            if (raw == null || raw === "") return null;
            if (typeof raw === "number" && !isNaN(raw)) return raw;
            const s0 = cellDisplayString(raw).trim();
            const m = s0.match(/-?[\d.,]+/); if (!m) return null;
            let s = m[0];
            const comma = s.indexOf(","), dot = s.indexOf(".");
            if (comma !== -1 && dot !== -1) {
                if (comma > dot) s = s.replace(/\./g, "").replace(",", ".");
                else s = s.replace(/,/g, "");
            } else if (comma !== -1) s = s.replace(",", ".");
            else if (dot !== -1 && s.indexOf(".", dot + 1) !== -1) s = s.replace(/\./g, "");
            const n = parseFloat(s); return isNaN(n) ? null : n;
        }
        function formatMoney(n) {
            if (n == null || isNaN(n)) return "";
            if (n === 0) return "";
            return new Intl.NumberFormat("vi-VN", { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
        }

        function parseNgaySuaChuaValue(raw) {
            if (raw == null) return null;
            const ordered = typeof raw === "object" && raw !== null
                ? [raw.Value, raw.value, raw.DisplayValue, raw.displayValue, raw.FormattedValue, raw.formattedValue, raw.Text, raw.text]
                : [raw];
            for (const item of ordered) {
                const txt = normalizeSpaces(item); if (!txt) continue;
                let m = txt.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[T\s].*)?$/);
                if (m) { const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])); if (!isNaN(d.getTime())) return d; }
                m = txt.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[\s,].*)?$/);
                if (m) {
                    const a = Number(m[1]), b = Number(m[2]), y = Number(m[3]);
                    if (a > 12 && b <= 12) { const d = new Date(y, b - 1, a); if (!isNaN(d.getTime())) return d; }
                    else if (b > 12 && a <= 12) { const d = new Date(y, a - 1, b); if (!isNaN(d.getTime())) return d; }
                    else { const d = new Date(y, a - 1, b); if (!isNaN(d.getTime())) return d; }
                }
                const dN = new Date(txt); if (!isNaN(dN.getTime())) return dN;
            }
            return null;
        }

        function pickTenThietBiSuaChua(row) {
            const direct = pickFirstCell(row, ["Tên XMTB", "Ten XMTB", "Tên thiết bị sửa chữa", "Ten thiet bi sua chua"]);
            if (direct) return direct;
            return pickFirstCell(row, ["Tên tài sản", "Ten tai san", "Tên thiết bị", "Ten thiet bi"]);
        }
        function pickTenLinhKienSuaChua(row) {
            const direct = pickFirstCell(row, [
                "Tên link kiện sửa chữa", "Tên linh kiện sửa chữa", "Ten link kien sua chua", "Ten linh kien sua chua",
                "Tên linh kiện", "Ten linh kien", "Diễn giải", "Dien giai", "Nội dung", "Noi dung"
            ]);
            if (direct) return direct;
            return pickByRegex(row, /t[eê]n.*(linh|link).*(ki[eệ]n).*(s[ửu]a).*(ch[uữ]a)/i);
        }
        function pickThanhTienSc(row) {
            const keys = ["Thành tiền SC", "Thanh tien SC", "Tiền SC", "Tien SC"];
            for (const k of keys) { const n = parseNumeric(row?.[k]); if (n != null) return n; }
            return null;
        }
        function pickSoLuongSc(row) {
            const keys = ["Số lượng SC", "So luong SC", "SL SC"]; 
            for (const k of keys) { const n = parseNumeric(row?.[k]); if (n != null) return n; }
            return null;
        }
        function pickDonGiaSc(row) {
            const keys = ["Đơn giá SC", "Don gia SC", "Đơn giá sửa chữa"];
            for (const k of keys) { const n = parseNumeric(row?.[k]); if (n != null) return n; }
            return null;
        }
        function pickTenNhom(row) {
            return pickFirstCell(row, ["Tên nhóm", "Ten nhom", "Nhóm", "Nhom"]);
        }

        function pickTenLaiMay(row) {
            const direct = pickFirstCell(row, [
                "Tên LM",
                "Ten LM",
                "Tên lái máy",
                "Ten lai may",
                "Lái máy",
                "Lai may",
                "Tên lái máy/XMTB",
                "Ten lai may/XMTB",
                "Tên người vận hành",
                "Ten nguoi van hanh"
            ]);
            if (direct) return direct;
            return pickByRegex(row, /(t[eê]n.*(l[aá]i|lm).*(m[aá]y|xmtb)|l[aá]i.*m[aá]y|t[eê]n.*v[aậ]n.*h[aà]nh)/i);
        }

        function fillThangSelectOptions(selectEl, values, emptyLabel) {
            if (!selectEl || selectEl.tagName !== "SELECT") return;
            const prev = selectEl.value;
            selectEl.innerHTML = "";
            const o0 = document.createElement("option");
            o0.value = "";
            o0.textContent = emptyLabel || "— Tất cả —";
            selectEl.appendChild(o0);
            for (const v of values) {
                const t = normalizeSpaces(v);
                if (!t) continue;
                const o = document.createElement("option");
                o.value = t;
                o.textContent = t;
                selectEl.appendChild(o);
            }
            const hasPrev = prev && [...selectEl.options].some((op) => op.value === prev);
            selectEl.value = hasPrev ? prev : "";
        }

        function populateThangFilterSelects() {
            const setTb = new Set();
            const setLm = new Set();
            const setNhom = new Set();
            for (const r of cacheNxlcCtRows || []) {
                const tb = normalizeSpaces(pickTenThietBiSuaChua(r));
                const lm = normalizeSpaces(pickTenLaiMay(r));
                const nh = normalizeSpaces(pickTenNhom(r));
                if (tb) setTb.add(tb);
                if (lm) setLm.add(lm);
                if (nh) setNhom.add(nh);
            }
            const sortVi = (a, b) => String(a).localeCompare(String(b), "vi");
            fillThangSelectOptions(document.getElementById("thang-filter-ten-tb"), [...setTb].sort(sortVi));
            fillThangSelectOptions(document.getElementById("thang-filter-ten-lm"), [...setLm].sort(sortVi));
            fillThangSelectOptions(document.getElementById("thang-filter-nhom"), [...setNhom].sort(sortVi));
        }

        function getDateRangeFromFilters() {
            const fromRaw = document.getElementById("thang-filter-from-date")?.value?.trim() ?? "";
            const toRaw = document.getElementById("thang-filter-to-date")?.value?.trim() ?? "";
            const from = fromRaw ? new Date(fromRaw + "T00:00:00") : null;
            const to = toRaw ? new Date(toRaw + "T23:59:59") : null;
            return {
                hasFrom: !!(from && !isNaN(from.getTime())),
                hasTo: !!(to && !isNaN(to.getTime())),
                from: from && !isNaN(from.getTime()) ? from : null,
                to: to && !isNaN(to.getTime()) ? to : null
            };
        }
        function rowInDateRange(dateObj, dateRange) {
            if (!dateRange?.hasFrom && !dateRange?.hasTo) return true;
            if (!dateObj || isNaN(dateObj.getTime())) return false;
            if (dateRange.hasFrom && dateObj < dateRange.from) return false;
            if (dateRange.hasTo && dateObj > dateRange.to) return false;
            return true;
        }

        async function fetchAppSheetTable(tableName) {
            const url = `https://api.appsheet.com/api/v2/apps/${encodeURIComponent(APPSHEET_CONFIG.appId)}/tables/${encodeURIComponent(tableName)}/Action`;
            const payload = { Action: "Find", Properties: { Locale: "vi-VN", Timezone: "Asia/Ho_Chi_Minh" }, Rows: [] };
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json", ApplicationAccessKey: APPSHEET_CONFIG.accessKey },
                body: JSON.stringify(payload)
            });
            if (!response.ok) { const err = await response.text(); throw new Error(`${tableName}: ${response.status} ${err}`); }
            const data = await response.json();
            if (Array.isArray(data)) return data;
            if (data && Array.isArray(data.Rows)) return data.Rows;
            return [];
        }

        function setStatus(msg, isErr) {
            let el = document.getElementById("thang-appsheet-status");
            if (!el) {
                const actions = document.querySelector(".thang-filter-actions");
                if (actions) { el = document.createElement("span"); el.id = "thang-appsheet-status"; el.style.cssText = "font-size:14px;font-weight:600;margin-left:6px;"; actions.appendChild(el); }
                else return;
            }
            el.textContent = msg;
            el.style.color = isErr ? "#b91c1c" : "#374151";
        }

        function renderMonthlyTable() {
            const thead = document.querySelector(".summary-month-table thead");
            const tbody = document.querySelector(".summary-month-table tbody");
            if (!thead || !tbody) return 0;

            const dateRange = getDateRangeFromFilters();
            if (dateRange.hasFrom && dateRange.hasTo && dateRange.from > dateRange.to) {
                const tmp = dateRange.from; dateRange.from = dateRange.to; dateRange.to = tmp;
            }

            // Parse and filter rows
            const rawItems = [];
            const qTb = normalizeSpaces(document.getElementById("thang-filter-ten-tb")?.value ?? "").toLowerCase();
            const qLm = normalizeSpaces(document.getElementById("thang-filter-ten-lm")?.value ?? "").toLowerCase();
            const qNhom = normalizeSpaces(document.getElementById("thang-filter-nhom")?.value ?? "").toLowerCase();
            for (const r of cacheNxlcCtRows || []) {
                const tenTb = pickTenThietBiSuaChua(r);
                const tenLk = pickTenLinhKienSuaChua(r);
                const tenLm = pickTenLaiMay(r);
                const nhomRow = pickTenNhom(r);
                const ngay = parseNgaySuaChuaValue(r["Ngày sửa chữa"] ?? r["Ngay sua chua"] ?? r["Ngày SC"] ?? r["Ngay SC"]);
                if (!rowInDateRange(ngay, dateRange)) continue;

                if (qTb && normalizeSpaces(tenTb || "").toLowerCase() !== qTb) continue;
                if (qLm && normalizeSpaces(tenLm || "").toLowerCase() !== qLm) continue;
                if (qNhom && normalizeSpaces(nhomRow || "").toLowerCase() !== qNhom) continue;

                const sl = pickSoLuongSc(r);
                const dg = pickDonGiaSc(r);
                const ttRaw = pickThanhTienSc(r);
                const tt = ttRaw != null ? ttRaw : ((sl != null && dg != null) ? sl * dg : 0);

                // Skip rows without linh kiện name AND zero cost
                if (!tenLk && tt === 0) continue;

                rawItems.push({
                    tenTb: tenTb || "Không xác định",
                    tenLk: tenLk || "",
                    ngay,
                    tt,
                    nhom: nhomRow
                });
            }

            if (!rawItems.length) {
                thead.innerHTML = `<tr><th>DIỄN GIẢI</th><th>Tổng cộng</th></tr>`;
                const hadText = !!(qTb || qLm || qNhom);
                tbody.innerHTML = hadText
                    ? `<tr><td colspan="2" class="text-left">Không có dòng phù hợp khoảng ngày và/hoặc bộ lọc (tên thiết bị / lái máy / nhóm).</td></tr>`
                    : `<tr><td colspan="2" class="text-left">Không có dữ liệu phù hợp từ «Nhập xuất luân chuyển CT».</td></tr>`;
                return 0;
            }

            // Determine year-months present in data
            const yearMonthSet = new Set();
            rawItems.forEach(item => {
                if (item.ngay) {
                    const y = item.ngay.getFullYear();
                    const m = item.ngay.getMonth() + 1;
                    yearMonthSet.add(`${y}-${String(m).padStart(2, "0")}`);
                }
            });
            const yearMonths = [...yearMonthSet].sort();

            // Build flat column list: DIỄN GIẢI | T01.2026 | T02.2026 | ... | Tổng cộng
            const columns = [];
            columns.push({ key: "label", header: "DIỄN GIẢI", width: "23%" });
            yearMonths.forEach(ym => {
                const [y, m] = ym.split("-");
                columns.push({ key: ym, header: `T${m}.${y}`, width: "6%" });
            });
            columns.push({ key: "total", header: "Tổng cộng", width: "9%" });

            // Build header
            thead.innerHTML = `<tr>${columns.map(c => `<th style="width:${c.width};">${c.header}</th>`).join("")}</tr>`;

            // Group by equipment -> year-month
            const grouped = {};
            const groupTotals = {};
            rawItems.forEach(item => {
                const tb = item.tenTb;
                if (!grouped[tb]) grouped[tb] = { byYM: {}, total: 0, nhom: item.nhom };
                const ym = item.ngay ? `${item.ngay.getFullYear()}-${String(item.ngay.getMonth() + 1).padStart(2, "0")}` : null;
                if (ym) grouped[tb].byYM[ym] = (grouped[tb].byYM[ym] || 0) + item.tt;
                grouped[tb].total += item.tt;

                const nhom = item.nhom || "Khác";
                if (!groupTotals[nhom]) groupTotals[nhom] = { byYM: {}, total: 0, items: new Set() };
                if (ym) groupTotals[nhom].byYM[ym] = (groupTotals[nhom].byYM[ym] || 0) + item.tt;
                groupTotals[nhom].total += item.tt;
                groupTotals[nhom].items.add(tb);
            });

            // Build body rows
            let html = "";
            let totalCount = 0;
            const nhomKeys = Object.keys(groupTotals).sort((a, b) => a.localeCompare(b, "vi"));
            let nhomIdx = 0;

            nhomKeys.forEach(nhom => {
                nhomIdx++;
                const grp = groupTotals[nhom];

                // Group header row
                html += `<tr class="group-row"><td class="text-left">${escapeHtml(nhomIdx.toString().padStart(2, "0") + ". " + nhom.toUpperCase())}</td>`;
                yearMonths.forEach(ym => {
                    html += `<td class="text-right">${formatMoney(grp.byYM[ym] || 0)}</td>`;
                });
                html += `<td class="text-right">${formatMoney(grp.total)}</td></tr>`;

                // Child rows (equipment)
                const tbKeys = [...grp.items].sort((a, b) => a.localeCompare(b, "vi"));
                tbKeys.forEach(tb => {
                    totalCount++;
                    const eq = grouped[tb];
                    html += `<tr class="child-row"><td class="text-left">${escapeHtml(tb)}</td>`;
                    yearMonths.forEach(ym => {
                        html += `<td class="text-right">${formatMoney(eq.byYM[ym] || 0)}</td>`;
                    });
                    html += `<td class="text-right">${formatMoney(eq.total)}</td></tr>`;
                });
            });

            // Grand total row
            const grandTotal = rawItems.reduce((s, i) => s + i.tt, 0);
            html += `<tr class="group-row"><td class="text-left">TỔNG CỘNG</td>`;
            yearMonths.forEach(ym => {
                const ymTotal = rawItems.filter(i => i.ngay && `${i.ngay.getFullYear()}-${String(i.ngay.getMonth() + 1).padStart(2, "0")}` === ym).reduce((s, i) => s + i.tt, 0);
                html += `<td class="text-right">${formatMoney(ymTotal)}</td>`;
            });
            html += `<td class="text-right">${formatMoney(grandTotal)}</td></tr>`;

            tbody.innerHTML = html;
            return totalCount;
        }

        async function loadFromAppSheet(forceRefresh) {
            const btnLoad = document.getElementById("thang-btn-load");
            const btnRefresh = document.getElementById("thang-btn-refresh");
            if (btnLoad) btnLoad.disabled = true;
            if (btnRefresh) btnRefresh.disabled = true;
            try {
                if (forceRefresh) cacheNxlcCtRows = null;
                setStatus("Đang tải AppSheet…", false);
                if (!cacheNxlcCtRows) {
                    cacheNxlcCtRows = await fetchAppSheetTable(TABLE_NXLC_CT);
                }
                populateThangFilterSelects();
                syncMainTitleFromDateRange();
                const shown = renderMonthlyTable();
                setStatus(`Đã tải ${cacheNxlcCtRows.length} dòng «${TABLE_NXLC_CT}», đang hiển thị ${shown} thiết bị.`, false);
            } catch (error) {
                console.error(error);
                setStatus(`Lỗi: ${error?.message || error}`, true);
            } finally {
                if (btnLoad) btnLoad.disabled = false;
                if (btnRefresh) btnRefresh.disabled = false;
            }
        }

        document.getElementById("thang-btn-load")?.addEventListener("click", () => loadFromAppSheet(false));
        document.getElementById("thang-btn-refresh")?.addEventListener("click", () => loadFromAppSheet(true));
        for (const id of ["thang-filter-from-date", "thang-filter-to-date", "thang-filter-ten-tb", "thang-filter-ten-lm", "thang-filter-nhom"]) {
            const el = document.getElementById(id);
            if (!el) continue;
            el.addEventListener("change", () => {
                if (cacheNxlcCtRows) {
                    syncMainTitleFromDateRange();
                    renderMonthlyTable();
                }
            });
        }

        // Auto-load on page open
        loadFromAppSheet(false);
    </script>
</body>
