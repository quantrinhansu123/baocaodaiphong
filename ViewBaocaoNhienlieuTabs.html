<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Tổng hợp báo cáo</title>
    <style>
        :root {
            --primary: #0b57d0;
            --border: #d1d5db;
            --bg: #f3f4f6;
            --text: #111827;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: #fff;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: #374151;
            border-radius: 2px;
            padding: 20px 32px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            min-height: 68px;
        }

        .tab-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .tab-panels {
            flex: 1;
            min-height: 0;
        }

        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .tab-panel.active {
            display: block;
        }

        @media (max-width: 1100px) {
            .tab-btn {
                font-size: 18px;
                padding: 16px 24px;
                min-height: 58px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="tabs">
            <button class="tab-btn active" data-tab="bc-thiet-bi" type="button">BC thiết bị</button>
            <button class="tab-btn" data-tab="bc-nhien-lieu" type="button">BC nhiên liệu</button>
            <button class="tab-btn" data-tab="bc-sua-chua" type="button">BC sửa chữa</button>
            <button class="tab-btn" data-tab="bc-kiem-ke" type="button">BC kiểm kê</button>
            <button class="tab-btn" data-tab="bc-ke-hoach" type="button">BC kế hoạch bảo dưỡng</button>
            <button class="tab-btn" data-tab="bc-cong-viec" type="button">BC công việc</button>
        </div>

        <div class="tab-panels">
            <iframe
                id="panel-report"
                class="tab-panel active"
                src="./Baocaotieuhaonhienlieu.html?v=20260421-05&tab=trang-thiet-bi&group=thiet-bi"
                title="View tổng hợp báo cáo">
            </iframe>
        </div>
    </div>

    <script>
        const buttons = Array.from(document.querySelectorAll(".tab-btn"));
        const panel = document.getElementById("panel-report");
        let currentTopTab = "bc-thiet-bi";
        const CACHE_VER = "20260424-02";

        const TAB_SOURCES = {
            "bc-thiet-bi": `./Baocaotieuhaonhienlieu.html?v=${CACHE_VER}&tab=trang-thiet-bi&group=thiet-bi`,
            "bc-nhien-lieu": `./BaocaoNL.html?v=${CACHE_VER}&group=nhien-lieu`,
            "bc-sua-chua": `./BaocaoTonghopCPSuachua.html?v=${CACHE_VER}&group=sua-chua`,
            "bc-kiem-ke": `./BaocaoKiemKeThietBi.html?v=${CACHE_VER}&group=kiem-ke`,
            "bc-ke-hoach": `./BaocaoSCnam2025.html?v=${CACHE_VER}&group=ke-hoach`,
            "bc-cong-viec": `./BangChiTietGioLamViec.html?v=${CACHE_VER}&group=cong-viec`
        };

        const CHILD_TAB_GROUPS = {
            "bc-thiet-bi": new Set(["tab-trang-thiet-bi", "tab-xe-ben", "tab-xe-bon", "tab-thue-thiet-bi"]),
            "bc-nhien-lieu": new Set(["tab-ton-kho-nl", "tab-chi-tiet-nl", "tab-xuat-nl-theo-ct"]),
            "bc-sua-chua": new Set(["tab-sc-bc02", "tab-sc-bc03", "tab-sc-bc04"]),
            "bc-kiem-ke": new Set(["tab-kiem-ke-thiet-bi"]),
            "bc-ke-hoach": new Set([]),
            "bc-cong-viec": new Set(["tab-cong-viec", "tab-cong-viec-ngay"])
        };

        function applyChildTabGrouping() {
            if (!panel) return;
            let doc;
            try {
                doc = panel.contentDocument;
            } catch (e) {
                return;
            }
            if (!doc) return;

            const container = doc.querySelector(".report-tabs-container");
            if (!container) return;

            const allowed = CHILD_TAB_GROUPS[currentTopTab] || new Set();
            const childButtons = container.querySelectorAll(".report-tab-btn");

            childButtons.forEach((btn) => {
                const id = btn.id || "";
                btn.style.fontSize = "16pt";
                if (!allowed.size) {
                    btn.style.display = "none";
                    return;
                }
                btn.style.display = allowed.has(id) ? "" : "none";
            });

            const anyVisible = Array.from(childButtons).some((btn) => btn.style.display !== "none");
            if (!anyVisible) {
                container.style.display = "none";
                container.style.gridTemplateColumns = "";
                return;
            }

            const visibleCount = Array.from(childButtons).filter((btn) => btn.style.display !== "none").length;
            if (currentTopTab === "bc-nhien-lieu" && visibleCount > 1) {
                container.style.display = "grid";
                container.style.gridTemplateColumns = `repeat(${visibleCount}, minmax(0, 1fr))`;
            } else {
                container.style.display = "flex";
                container.style.gridTemplateColumns = "";
            }
        }

        function activateTab(tab) {
            currentTopTab = tab;
            buttons.forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.tab === tab);
            });
            const src = TAB_SOURCES[tab];
            if (!src || !panel) return;
            if (panel.getAttribute("src") !== src) {
                panel.setAttribute("src", src);
            } else {
                applyChildTabGrouping();
            }
        }

        buttons.forEach((btn) => {
            btn.addEventListener("click", () => activateTab(btn.dataset.tab));
        });

        panel.addEventListener("load", applyChildTabGrouping);
        activateTab(currentTopTab);
    </script>
</body>
</html>
