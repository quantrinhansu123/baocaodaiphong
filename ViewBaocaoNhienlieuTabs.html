<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Tổng hợp báo cáo</title>
    <style>
        :root {
            --primary: #0b57d0;
            --border: #d1d5db;
            --bg: #f3f4f6;
            --text: #111827;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: #fff;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: #374151;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .tab-panels {
            flex: 1;
            min-height: 0;
        }

        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .tab-panel.active {
            display: block;
        }

        @media (max-width: 1100px) {
            .tab-btn {
                font-size: 12px;
                padding: 7px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="tabs">
            <button class="tab-btn active" data-tab="bc-thiet-bi" type="button">BC thiết bị</button>
            <button class="tab-btn" data-tab="bc-nhien-lieu" type="button">BC nhiên liệu</button>
            <button class="tab-btn" data-tab="bc-sua-chua" type="button">BC sửa chữa</button>
            <button class="tab-btn" data-tab="bc-kiem-ke" type="button">BC kiểm kê</button>
            <button class="tab-btn" data-tab="bc-ke-hoach" type="button">BC kế hoạch bảo dưỡng</button>
        </div>

        <div class="tab-panels">
            <iframe
                id="panel-report"
                class="tab-panel active"
                src="./Baocaotieuhaonhienlieu.html?tab=trang-thiet-bi&group=thiet-bi"
                title="View tổng hợp báo cáo">
            </iframe>
        </div>
    </div>

    <script>
        const buttons = Array.from(document.querySelectorAll(".tab-btn"));
        const panel = document.getElementById("panel-report");
        let currentTopTab = "bc-thiet-bi";

        const TAB_SOURCES = {
            "bc-thiet-bi": "./Baocaotieuhaonhienlieu.html?tab=trang-thiet-bi&group=thiet-bi",
            "bc-nhien-lieu": "./BaocaoNL.html?group=nhien-lieu",
            "bc-sua-chua": "./BaocaoTonghopCPSuachua.html?group=sua-chua",
            "bc-kiem-ke": "./BaocaoKiemKeThietBi.html?group=kiem-ke",
            "bc-ke-hoach": "./BaocaoSCnam2025.html?group=ke-hoach"
        };

        const CHILD_TAB_GROUPS = {
            "bc-thiet-bi": new Set(["tab-trang-thiet-bi", "tab-xe-ben", "tab-xe-bon"]),
            "bc-nhien-lieu": new Set(["tab-ton-kho-nl", "tab-chi-tiet-nl", "tab-xuat-nl-theo-ct"]),
            "bc-sua-chua": new Set(["tab-tong-hop-sc"]),
            "bc-kiem-ke": new Set(["tab-kiem-ke-thiet-bi"]),
            "bc-ke-hoach": new Set([])
        };

        function applyChildTabGrouping() {
            if (!panel) return;
            let doc;
            try {
                doc = panel.contentDocument;
            } catch (e) {
                return;
            }
            if (!doc) return;

            const container = doc.querySelector(".report-tabs-container");
            if (!container) return;

            const allowed = CHILD_TAB_GROUPS[currentTopTab] || new Set();
            const childButtons = container.querySelectorAll(".report-tab-btn");

            childButtons.forEach((btn) => {
                const id = btn.id || "";
                if (!allowed.size) {
                    btn.style.display = "none";
                    return;
                }
                btn.style.display = allowed.has(id) ? "" : "none";
            });

            const anyVisible = Array.from(childButtons).some((btn) => btn.style.display !== "none");
            container.style.display = anyVisible ? "flex" : "none";
        }

        function activateTab(tab) {
            currentTopTab = tab;
            buttons.forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.tab === tab);
            });
            const src = TAB_SOURCES[tab];
            if (!src || !panel) return;
            if (panel.getAttribute("src") !== src) {
                panel.setAttribute("src", src);
            } else {
                applyChildTabGrouping();
            }
        }

        buttons.forEach((btn) => {
            btn.addEventListener("click", () => activateTab(btn.dataset.tab));
        });

        panel.addEventListener("load", applyChildTabGrouping);
        activateTab(currentTopTab);
    </script>
</body>
</html>
