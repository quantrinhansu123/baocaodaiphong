<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Báo cáo nhiên liệu</title>
    <style>
        :root {
            --primary: #0b57d0;
            --border: #d1d5db;
            --bg: #f3f4f6;
            --text: #111827;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: #fff;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: #374151;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .tab-panels {
            flex: 1;
            min-height: 0;
        }

        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .tab-panel.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="tabs">
            <button class="tab-btn active" data-tab="main" type="button">Báo cáo tiêu hao nhiên liệu</button>
            <button class="tab-btn" data-tab="thietbi" type="button">Báo cáo tiêu hao nhiên liệu thiết bị</button>
        </div>

        <div class="tab-panels">
            <iframe
                id="panel-main"
                class="tab-panel active"
                src="./Baocaotieuhaonhienlieu.html?v=20260417a"
                title="Báo cáo tiêu hao nhiên liệu">
            </iframe>

            <iframe
                id="panel-thietbi"
                class="tab-panel"
                src="./Baocaotieuhaonhienlieuthietbi.html?v=20260417a"
                title="Báo cáo tiêu hao nhiên liệu thiết bị">
            </iframe>
        </div>
    </div>

    <script>
        const buttons = Array.from(document.querySelectorAll(".tab-btn"));
        const panels = {
            main: document.getElementById("panel-main"),
            thietbi: document.getElementById("panel-thietbi")
        };

        function activateTab(tab) {
            buttons.forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.tab === tab);
            });
            Object.entries(panels).forEach(([key, panel]) => {
                panel.classList.toggle("active", key === tab);
            });
        }

        buttons.forEach((btn) => {
            btn.addEventListener("click", () => activateTab(btn.dataset.tab));
        });
    </script>
</body>
</html>
